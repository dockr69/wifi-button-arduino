name: Build WiFi Button Builder

# Baut die GUI als Windows-.exe (One-Folder-ZIP).
# - Manuell startbar (workflow_dispatch)
# - Bei einem Tag v* entsteht zusätzlich ein GitHub Release mit dem ZIP.
# (macOS läuft direkt über die .py, daher kein .app-Build mehr.)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # für das Erstellen von Releases

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wifi-button-builder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tk (das Modul importiert tkinter)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial pytest

      - name: Run tests
        run: python -m pytest tests/ -q

  build:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: wifi-button-builder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial pyinstaller

      - name: Build Windows app (one-folder)
        # One-folder statt one-file: ohne selbst-entpackenden Bootloader gibt es
        # deutlich seltener den Defender-False-Positive (Wacatac.B!ml). Der Ordner
        # wird als ZIP verteilt.
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir --name "WiFi Button Builder" wifi_button_builder.py
          Compress-Archive -Path "dist/WiFi Button Builder" -DestinationPath "dist/WiFi Button Builder-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFi-Button-Builder-Windows
          path: wifi-button-builder/dist/WiFi Button Builder-Windows.zip

      - name: Attach Windows ZIP to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wifi-button-builder/dist/WiFi Button Builder-Windows.zip
